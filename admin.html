<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Panel XE Taller</title><link rel="stylesheet" href="style.css"></head><body><div class="grid"></div><header><div class="kicker">XE SERVICIO ELECTRÓNICO</div><h1>PANEL <span>XE TALLER</span></h1><p>Recepción y seguimiento de equipos</p></header><main class="admin">
<section id="login" class="panel"><h2>ACCESO PRIVADO</h2><input id="email" type="email" placeholder="Correo administrador"><input id="pass" type="password" placeholder="Contraseña"><button id="loginBtn">ENTRAR</button><small id="loginMsg"></small></section>
<div id="dashboard" class="hidden"><section class="panel"><div class="head"><h2>NUEVA RECEPCIÓN</h2><button id="logout">SALIR</button></div><div class="form"><input id="cliente" placeholder="Nombre del cliente"><input id="telefono" placeholder="WhatsApp"><input id="equipo" placeholder="Equipo: Xbox Series S, PS5..."><input id="modelo" placeholder="Modelo / versión"><textarea id="falla" placeholder="Falla reportada"></textarea><textarea id="nota" placeholder="Nota visible para cliente"></textarea></div><button id="crear">CREAR RECEPCIÓN Y FOLIO</button><strong id="created"></strong></section>
<section class="panel"><div class="head"><h2>EQUIPOS EN TALLER</h2><input id="filter" placeholder="Buscar folio, equipo o cliente"></div><div id="list" class="list"></div></section></div></main><script type="module" src="admin.js"></script></body></html>
