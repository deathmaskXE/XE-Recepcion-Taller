<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agenda XE Taller</title><link rel="stylesheet" href="style.css"></head><body><div class="grid"></div><header><div class="kicker">XE SERVICIO ELECTRÓNICO</div><h1>AGENDA <span>DE CITAS</span></h1><p>Administración privada de citas</p></header><main class="admin">
<section id="login" class="panel"><h2>ACCESO PRIVADO</h2><input id="email" type="email" placeholder="Correo administrador"><input id="pass" type="password" placeholder="Contraseña"><button id="loginBtn">ENTRAR</button><small id="loginMsg"></small></section>
<div id="dashboard" class="hidden"><section class="panel"><div class="head"><h2>NUEVA CITA</h2><div class="nav-actions"><a class="button-link" href="admin.html">RECEPCIÓN</a><button id="logout">SALIR</button></div></div><div class="form"><input id="cliente" placeholder="Nombre del cliente"><input id="telefono" placeholder="WhatsApp"><input id="equipo" placeholder="Equipo que llevará"><input id="modelo" placeholder="Modelo / versión"><textarea id="falla" placeholder="Falla reportada"></textarea><div class="date-time-grid"><label>FECHA<input id="fecha" type="date"></label><label>HORA<input id="hora" type="time"></label></div></div><button id="crearCita">CREAR CITA Y FOLIO</button><strong id="createdCita"></strong></section>
<section class="panel"><div class="head"><h2>CITAS REGISTRADAS</h2><input id="filterCitas" placeholder="Buscar folio, cliente o equipo"></div><div id="calendarSummary" class="calendar-summary"></div><div id="citasList" class="list"></div></section></div></main><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script type="module" src="agenda.js"></script></body></html>
